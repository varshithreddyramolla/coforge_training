<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Assignment-5 Change Font</title>
<script>

	function changeFont() {
		document.getElementById("h5").style.fontSize="50px";
	}

</script>
</head>
<body>
	<p id="h5">My Name is Varshith Reddy</p>
	<button onclick="changeFont()">Click</button>
</body>
</html>
