<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bootstrap Grid</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="row">
        <div class="col-12">
            <div class="bg-primary text-center rounded-4 py-4"
                 style="background:#5A84D6 !important;">
                <h1 class="display-2 fw-bold text-dark">Header</h1>
            </div>
        </div>
    </div>

    <!-- Columns -->
    <div class="row mt-3">

        <div class="col-md-4">
            <div class="bg-success rounded-5 d-flex justify-content-center align-items-center"
                 style="height:280px;">
                <h2 class="fw-bold">Column 1</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="rounded-5 d-flex justify-content-center align-items-center"
                 style="height:280px;background:#F58220;">
                <h2 class="fw-bold">Column 2</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="bg-warning rounded-5 d-flex justify-content-center align-items-center"
                 style="height:280px;">
                <h2 class="fw-bold">Column 3</h2>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="row mt-3">
        <div class="col-12">
            <div class="bg-info rounded-2 text-center py-2">
                <h2 class="fw-bold">Footer</h2>
            </div>
        </div>
    </div>

</div>

</body>
</html>
