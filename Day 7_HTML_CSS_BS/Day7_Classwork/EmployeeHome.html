<!DOCTYPE html>
<html>
<head>
	<meta charset="ISO-8859-1">
	<title>Employee Management System</title>
	<link href="EMSStyle.css" rel="stylesheet"></link>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
	<div class="Header">
		<h1>Employee Management System</h1>
	</div>
	<br>
	<div class="content">
		<table>
		<tr>
			<td>Employee ID</td>
			<td><input type="number"></input></td>
		</tr>
		<tr>
			<td>Employee Name</td>
			<td><input type="text"></input></td>
		</tr>
		<tr>
			<td>Employee Salary</td>
			<td><input type="number"></input></td>
		</tr>
		<tr>
			<td>Department Number</td>
			<td><input type="number"></input></td>
		</tr>
		</table>
		<br>
		<input type="submit" value="Insert" class="btn-primary">&nbsp; &nbsp;</input>
		<input type="submit" value="Delete" class="btn-danger">&nbsp; &nbsp;</input>
		<input type="submit" value="Update" class="btn-warning">&nbsp; &nbsp;</input>
		<input type="submit" value="Find" class="btn-success">&nbsp; &nbsp;</input>
		<input type="submit" value="FindAll" class="btn-info">&nbsp; &nbsp;</input>
		</br>
	</div>
</body>
</html>
