<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Factorial Table</title>
<script>
	function factorial() {
		var number = parseInt(document.getElementById("n").value);
		var fact = 1;
		var result = "";
		
		result = "<table border='1' width='60%'>";
		result += "<tr><th>Number</th><th>Factorial</th></tr>";
		
		for(let i = 1; i <= number; i++) {
			fact = fact * i;
			result += "<tr><td>" + i + "</td><td>" + fact + "</td></tr><br>";
		}
		document.getElementById("Result").innerHTML=result;
	}
</script>
</head>
<body>
	Enter the number: <input type="number" id="n">
	<br>
	<button onclick="factorial()">Calculate Factorial</button>
	<div id="Result">
	</div>
</body>
</html>
