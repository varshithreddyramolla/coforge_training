<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>JavaScript ES6</title>
<!-- Default Parameters -->
<script>

	function add(a=10,b=20) {
		console.log(a+b);
	}
	add(); //30
	add(100); //120
	add(100,200); //300
	
</script>

<!-- Rest Parameters -->
<script>

	function add(a, b, ...args) {
		console.log(a+b);
		
		let total = 0;
		for(let n of args) {
			total = total + n;
		}
		console.log(total)
	}
	add(100,200,10,20,30);
	
</script>

<!-- Spread Operator -->
<script>

	const odd = [1, 3, 5];
	const combined = [2, 4, 6, ...odd];
	console.log(combined);

</script>

<!-- Array destructuring -->
<script>

	let arr = [10, 20, 30, 40, 50];
	let [x, y, z] = arr;
	console.log(x); //10
	console.log(y); //20
	console.log(z); //30
	
	let [a, b, c, ...args] = arr;
	console.log(args); //[40,50]

</script>

<!-- Object Destructuring -->
<script>

let person = {
		firstName : "Varshith",
		lastName : "Reddy"
}
let {firstName: fname, lastName: lname} = person;

</script>

<!-- Lambda => function -->
<script>

	const add = (a, b) => a + b;
	const Welcome = (name) => "Welcome" + name;
	
	function myFunction() {
		console.log(add(10, 20));
		console.log(welcome("Varshith"));
	}

</script>
</head>
<body>

</body>
</html>
